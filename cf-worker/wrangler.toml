# ⚠️ 注意：当前项目使用 Cloudflare Pages Functions，此配置仅用于 D1 schema 参考
# Pages Functions 的 D1 绑定和环境变量请在 CF Dashboard 中配置
# 详见: https://dash.cloudflare.com → Workers & Pages → 你的项目 → Settings → Functions

name = "cloud-drive-api"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库（仅供参考，Pages 绑定在 Dashboard 中配置）
[[d1_databases]]
binding = "DB"
database_name = "cloud-drive-db"
database_id = ""

# 生产环境变量（请用 wrangler secret put 设置）
# npx wrangler secret put JWT_SECRET
# npx wrangler secret put ADMIN_PASSWORD
